name: TailInput
options:
  bundleIdPrefix: com.framed
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  TailInput:
    type: application
    platform: macOS
    sources:
      - path: Sources/SmartInputSwitcher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.framed.TailInput
        INFOPLIST_FILE: Sources/SmartInputSwitcher/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_NAME: TailInput
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
